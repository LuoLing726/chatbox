name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build web and sync Android
        run: |
          export CHATBOX_BUILD_TARGET=mobile_app
          export CHATBOX_BUILD_PLATFORM=android
          npx electron-vite build
          echo '{"appId":"xyz.chatboxapp.ce","appName":"Chatbox","webDir":"release/app/dist/renderer"}' > capacitor.config.json
          npx cap add android
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          echo "========== Looking for APK =========="
          find . -name "*.apk" -type f 2>/dev/null
          echo "======================================"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chatbox-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
