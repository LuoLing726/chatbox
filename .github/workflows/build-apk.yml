name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build web and sync Android
        run: |
          export CHATBOX_BUILD_TARGET=mobile_app
          export CHATBOX_BUILD_PLATFORM=android
          npx electron-vite build
          echo '{"appId":"xyz.chatboxapp.ce","appName":"Chatbox","webDir":"release/app/dist/renderer"}' > capacitor.config.json
          npx cap add android
          npx cap sync android

      - name: Set up signing
        run: |
          keytool -genkeypair -v \
            -keystore android/chatbox-release.keystore \
            -alias chatbox \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Chatbox, OU=Dev, O=Chatbox, L=Earth, S=Online, C=US"
          echo "Checking keystore file:"
          ls -la android/chatbox-release.keystore

      - name: Configure Gradle build with signing config
        run: |
          cat >> android/app/build.gradle << 'EOF'
          
          android {
              signingConfigs {
                  release {
                      storeFile file("../chatbox-release.keystore")
                      storePassword "android"
                      keyAlias "chatbox"
                      keyPassword "android"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chatbox-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
